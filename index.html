 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Job Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<!-- font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
<style>
    *{
        font-family: "Geist", sans-serif;
    }
    
</style>


 </head>
 <body class="bg-gray-100">
    <div class="max-w 5xl mx-auto p-6">

        <!-- title -->
        <h1 class="text-5xl font-bold text-blue-500 mb-5">Job Application Tracker</h1>
        <div class="grid grid-cols-3 gap-10">
            <div class="bg-sky-400 p-4">
                <p>Total</p>
                <p id="total">0</p>
            </div>

            <div class="bg-green-400 p-4">
                <p>Interview</p>
                <p id="interviewCount">0</p>
            </div>

            <div class="bg-red-400 p-4">
                <p>Rejected</p>
                <p id="RejectedCount">0</p>
            </div>
        </div>

    </div>

    

    
    <script src="script.js"></script>
 </body>
 </html>
