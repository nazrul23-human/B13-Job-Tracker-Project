<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Job Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>
</head>

<body class="bg-gray-100">
    <div class="max-w-6xl  mx-auto p-8">

        <!-- title -->
        <h1 class="text-5xl text-blue-800 font-bold mb-4">Job Application Tracker</h1>

        <!-- Dashboard -->
        <div class="grid grid-cols-3 gap-6 mb-6">
            <div class="rounded-1g shadow bg-white p-5">
                <p>total</p>
                <p id="allCount" class="text-2xl text-blue-500 font-bold">0</p>
            </div>

            <div class="bg-white rounded-lg shadow p-5">
                <p>Interview</p>
                <p id="interviewCount" class="text-2xl text-green-500">0</p>
            </div>

            <div class="rounded-lg shadow bg-white p-5">
                <p>Rejected</p>
                <p id="rejectedCount" class="text-red-500 text-2xl font-bold">0</p>
            </div>
        </div>
        <!-- Available -->
         <div class="flex justify-between">
            <h2 class="text-lg font-bold">Available Jobs</h2>
                <p id="totalCount">0 Jobs</p>
         </div>
         <!-- Tabs -->
          <div class="flte gap-3 mb-6">
            <button onclick="switchTab('all')" class="bg-blue-500 text-white px-5 py-2 rounded">All</button>

            <button onclick="switchTab('Interview')" class="bg-gray-300 px-5 py-2 rounded">Interview</button>

            <button onclick="switchTab('Rejected')" class= "bg-gray-300 px-5 py-2 rounded">Rejected</button>
          </div>






        

        <script src="script.js"></script>

</body>

</html>
