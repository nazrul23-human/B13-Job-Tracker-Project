<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Job Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    
    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>
</head>

<body class="bg-gray-100">

  <div class="max-w-5xl mx-auto p-6">

    <!-- TITLE -->
    <h1 class="text-3xl font-bold text-blue-800 mb-6">Job Application Tracker</h1>

    <!-- DASHBOARD -->
    <div class="grid grid-cols-3 gap-4 mb-8">

      <div class="bg-white p-5 rounded-lg shadow">
        <p>Total</p>
        <p id="allCount" class="text-2xl font-bold text-blue-800">0</p>
      </div>

      <div class="bg-white p-5 rounded-lg shadow">
        <p>Interview</p>
        <p id="interviewCount" class="text-2xl font-bold text-green-500">0</p>
      </div>

      <div class="bg-white p-5 rounded-lg shadow">
        <p>Rejected</p>
        <p id="rejectedCount" class="text-2xl font-bold text-red-500">0</p>
      </div>

    </div>

    <!-- AVAILABLE JOBS -->
    <div class="bg-white rounded-lg shadow p-6">

      <!-- Header -->
      <div class="flex justify-between mb-4">
        <h2 class="text-lg font-semibold">Available Jobs</h2>
        <p id="tabCount">0 jobs</p>
      </div>

      <!-- Tabs -->
      <div class="flex gap-3 mb-6">
        <button onclick="switchTab('all')" class="px-4 py-2 bg-blue-400 text-white rounded">All</button>

        <button onclick="switchTab('interview')" class="px-4 py-2 bg-gray-300 rounded">Interview</button>

        <button onclick="switchTab('rejected')" class="px-4 py-2 bg-gray-300 rounded">Rejected</button>
      </div>

      <!-- Cards -->
      <div id="cards" class="space-y-4"></div>

      <!-- Empty -->

      <div id="empty" class="bg-white flex flex-col items-center">
        <img src="./jobs.png" width="80">
        <h1 class="text-xl font-semibold mb-2">No jobs available</h1>
        <p class="text-gray-500">Check back soon for new job opportunities</p>
      </div>
    </div>

  </div>

  <script src="script.js"></script>

</body>

</html>
